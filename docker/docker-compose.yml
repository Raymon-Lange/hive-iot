services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: hive-iot-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ../services/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    restart: unless-stopped

volumes:
  mosquitto-data:
  mosquitto-log:
