services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: hive-iot-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ../services/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    restart: unless-stopped

  api:
    build:
      context: ../services/api
    container_name: hive-iot-api
    ports:
      - "8010:8000"
    environment:
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_BROKER_PORT=1883
      - HIVE_DB_PATH=/app/data/hive_iot.db
    volumes:
      - api-data:/app/data
    depends_on:
      - mosquitto
    restart: unless-stopped

  dashboard:
    build:
      context: ../dashboard
      args:
        VITE_API_URL: http://localhost:8010
    container_name: hive-iot-dashboard
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mosquitto-data:
  mosquitto-log:
  api-data:
