server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router client-side routes (e.g. /devices/:id) aren't real
    # files on disk, so fall back to index.html for any unmatched path.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
